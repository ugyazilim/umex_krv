name: FTP Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      protocol:
        description: 'FTP protokolü (ftp veya ftps)'
        required: false
        default: 'ftp'
        type: choice
        options:
          - ftp
          - ftps

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare web files only
        run: |
          rm -rf deploy
          mkdir deploy
          cp index.php .htaccess deploy/
          cp -r api panel deploy/
          rm -rf deploy/api/storage/*
          cp api/storage/.htaccess api/storage/.gitignore deploy/api/storage/
          cp api/storage/devices.json.example deploy/api/storage/ 2>/dev/null || true
          echo "Deploy dosya sayisi:"
          find deploy -type f | wc -l

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: nero.veridyen.com
          username: enjoybur
          password: "f#6g:7t7OBT8Ym"
          port: 21
          protocol: ${{ github.event.inputs.protocol || 'ftp' }}
          security: loose
          local-dir: ./deploy/
          server-dir: /yeni.enjoyburgerhouse.com/
          timeout: 300000
          log-level: verbose
