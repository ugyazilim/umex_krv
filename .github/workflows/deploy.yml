name: FTP Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      protocol:
        description: 'FTP protokolü (ftp veya ftps)'
        required: false
        default: 'ftp'
        type: choice
        options:
          - ftp
          - ftps

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: nero.veridyen.com
          username: enjoybur
          password: "f#6g:7t7OBT8Ym"
          port: 21
          protocol: ${{ github.event.inputs.protocol || 'ftp' }}
          security: loose
          local-dir: ./
          server-dir: /yeni.enjoyburgerhouse.com/
          timeout: 300000
          exclude: |
            **/.git*
            **/.github/**
            **/*.ino
            **/api/storage/**
            **/.ftp-deploy-sync-state.json
